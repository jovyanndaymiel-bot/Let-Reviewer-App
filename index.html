<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LET Reviewer App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .quiz-card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; font-size: 1.5em; margin-bottom: 20px; }
        .question { font-size: 1.1em; font-weight: 600; margin-bottom: 20px; text-align: left; line-height: 1.4; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 8px; background: none; cursor: pointer; text-align: left; font-size: 1em; transition: 0.2s; }
        .option:hover { border-color: #1a73e8; background-color: #f8faff; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .score { margin-top: 20px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="quiz-card">
    <h1>LET Professional Education</h1>
    <div id="quiz-box">
        <p id="question-text" class="question">Loading question...</p>
        <div id="options-container"></div>
        <div id="feedback"></div>
        <p class="score">Score: <span id="score-count">0</span></p>
    </div>
</div>

<script>
    const questions = [
        { q: "Which is the most basic professional obligation of a teacher?", options: ["To be a learner", "To be a leader", "To be a parent substitute", "To be a master of the subject"], correct: 0 },
        { q: "According to Piaget, at what stage can a child think logically about concrete objects?", options: ["Sensorimotor", "Pre-operational", "Concrete Operational", "Formal Operational"], correct: 2 },
        { q: "Which philosophy emphasizes that education should focus on the 'Great Books' and timeless truths?", options: ["Progressivism", "Perennialism", "Existentialism", "Essentialism"], correct: 1 },
        { q: "What is the primary legal basis for the Professionalization of Teachers in the Philippines?", options: ["RA 7836", "RA 9155", "RA 4670", "RA 10533"], correct: 0 },
        { q: "Which teaching style is most likely to result in students who are independent and self-motivated?", options: ["Authoritarian", "Permissive", "Authoritative", "Uninvolved"], correct: 2 }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').innerText = '';
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => check(i);
            container.appendChild(btn);
        });
    }

    function check(i) {
        const feedback = document.getElementById('feedback');
        if (i === questions[currentIdx].correct) {
            score++;
            document.getElementById('score-count').innerText = score;
            feedback.innerText = "Correct! Loading next...";
            feedback.style.color = "green";
            currentIdx = (currentIdx + 1) % questions.length;
            setTimeout(loadQuestion, 1500);
        } else {
            feedback.innerText = "Try again! Think about the key terms.";
            feedback.style.color = "#d93025";
        }
    }

    loadQuestion();
</script>

</body>
</html>
